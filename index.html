<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Intelligence v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #63ffda;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #4ade80;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 20px;
  }

  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header { text-align: center; padding: 24px 0 28px; }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(99,255,218,0.08));
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 20px; padding: 6px 14px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--accent3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
  }
  .logo-badge::before {
    content: ''; width: 6px; height: 6px;
    background: var(--accent3); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  h1 {
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle { color: var(--muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }

  /* ── SHEETS PANEL ── */
  .sheets-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 14px;
  }

  .panel-title {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
  }

  .sheet-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
  }

  .sheet-label {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--accent3); white-space: nowrap; width: 60px; flex-shrink: 0;
  }

  .sheet-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    transition: border-color 0.2s;
  }
  .sheet-input:focus { outline: none; border-color: var(--accent); }
  .sheet-input::placeholder { color: var(--muted); }

  .load-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .load-btn:hover { border-color: var(--accent); color: var(--accent3); }
  .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .add-sheet-btn {
    background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; padding: 8px 14px; color: var(--muted);
    font-family: 'Syne', sans-serif; font-size: 12px; cursor: pointer;
    transition: all 0.15s; margin-top: 4px; width: 100%;
  }
  .add-sheet-btn:hover { border-color: var(--accent); color: var(--text); }

  /* status badges */
  .sheet-status {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .status-idle    { color: var(--muted); background: transparent; border: 1px solid var(--border); }
  .status-loading { color: var(--accent); background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3); }
  .status-ok      { color: var(--green);  background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25); }
  .status-err     { color: var(--accent2); background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25); }

  .sheets-summary {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .sum-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted);
  }
  .sum-pill span { color: var(--accent3); }

  /* ── QUERY SECTION ── */
  .query-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .query-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

  .input-row { display: flex; gap: 10px; align-items: flex-start; }

  textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 14px;
    resize: none; min-height: 52px; transition: border-color 0.2s; line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }

  .ask-btn {
    background: linear-gradient(135deg, var(--accent), #8b7eff);
    border: none; border-radius: 10px; padding: 14px 22px; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap;
  }
  .ask-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,99,255,0.4); }
  .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .quick-prompts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .qp {
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 11px; font-size: 11px;
    color: var(--muted); cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.15s;
  }
  .qp:hover { border-color: var(--accent); color: var(--text); background: rgba(108,99,255,0.08); }

  /* ── ANSWER ── */
  .answer-section { margin-top: 14px; display: none; }
  .answer-section.visible { display: block; }

  .answer-card {
    background: var(--surface); border: 1px solid rgba(108,99,255,0.3);
    border-radius: 16px; padding: 20px; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .answer-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .ai-badge {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--accent3); background: rgba(99,255,218,0.08);
    border: 1px solid rgba(99,255,218,0.2); border-radius: 4px;
    padding: 2px 7px; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0;
  }
  .answer-q {
    font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .answer-body { font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .answer-body strong { color: var(--accent3); font-weight: 600; }

  .loading-dots { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
  .loading-dots span {
    width: 7px; height: 7px; background: var(--accent);
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }

  .error-msg { color: var(--accent2); font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  /* ── HISTORY ── */
  .history-section { margin-top: 18px; }
  .history-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--accent); }
  .hi-q { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .hi-a { font-size: 13px; color: var(--text); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* no-sheets notice */
  .no-sheets-notice {
    text-align: center; padding: 20px;
    color: var(--muted); font-size: 13px; font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <header>
    <div class="logo-badge">AI · Live CSV · Dynamic</div>
    <h1>Quote Intelligence</h1>
    <div class="subtitle">// Load any Google Sheet → ask questions instantly</div>
  </header>

  <!-- SHEETS LOADER -->
  <div class="sheets-panel">
    <div class="panel-title">// Google Sheets — paste URL or Sheet ID</div>
    <div id="sheetRows"></div>
    <button class="add-sheet-btn" onclick="addSheetRow()">+ Add another sheet</button>
    <div class="sheets-summary" id="sheetsSummary" style="display:none"></div>
  </div>

  <!-- QUERY -->
  <div class="query-section">
    <div class="query-label">// Your question</div>
    <div class="input-row">
      <textarea id="queryInput" placeholder="Load at least one sheet above, then ask anything..." rows="2"></textarea>
      <button class="ask-btn" onclick="askQuestion()" id="askBtn">Ask →</button>
    </div>
    <div class="quick-prompts" id="quickPrompts">
      <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted)">// load a sheet to see suggested queries</span>
    </div>
  </div>

  <!-- ANSWER -->
  <div class="answer-section" id="answerSection">
    <div class="answer-card">
      <div class="answer-header">
        <span class="ai-badge">AI Answer</span>
        <span class="answer-q" id="answerQ"></span>
      </div>
      <div id="answerBody"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">// Previous queries</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
// ── State ──
const sheets = [];   // { label, url, name, csvText, rowCount, headers }
const history = [];
let sheetCounter = 0;

// ── Sheet row UI ──
function addSheetRow(defaultUrl = '') {
  sheetCounter++;
  const idx = sheets.length;
  sheets.push({ label: `Sheet ${sheetCounter}`, url: '', name: '', csvText: '', rowCount: 0, headers: [] });

  const row = document.createElement('div');
  row.className = 'sheet-row';
  row.id = `row-${idx}`;
  row.innerHTML = `
    <span class="sheet-label" id="lbl-${idx}">Sheet ${sheetCounter}</span>
    <input class="sheet-input" id="url-${idx}" placeholder="https://docs.google.com/spreadsheets/d/…  or just the sheet ID" value="${defaultUrl}" />
    <button class="load-btn" id="btn-${idx}" onclick="loadSheet(${idx})">Load</button>
    <span class="sheet-status status-idle" id="status-${idx}">idle</span>
  `;
  document.getElementById('sheetRows').appendChild(row);

  // auto-load if url provided
  if (defaultUrl) {
    sheets[idx].url = defaultUrl;
    loadSheet(idx);
  }

  document.getElementById(`url-${idx}`).addEventListener('keydown', e => {
    if (e.key === 'Enter') loadSheet(idx);
  });
}

function extractSheetId(raw) {
  raw = raw.trim();
  // full URL
  const m = raw.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  // bare ID (alphanumeric + _ -)
  if (/^[a-zA-Z0-9_-]{20,}$/.test(raw)) return raw;
  return null;
}

async function loadSheet(idx) {
  const urlInput = document.getElementById(`url-${idx}`);
  const btn      = document.getElementById(`btn-${idx}`);
  const statusEl = document.getElementById(`status-${idx}`);

  const raw = urlInput.value.trim();
  const sheetId = extractSheetId(raw);

  if (!sheetId) {
    setStatus(idx, 'err', 'bad URL');
    return;
  }

  sheets[idx].url = raw;
  btn.disabled = true;
  setStatus(idx, 'loading', 'fetching…');

  // Try to fetch all sheets (gid=0 first, then discover tabs via export)
  // We fetch the default sheet (gid=0) as CSV
  const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=0`;

  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status} — make sure the sheet is shared as "Anyone with link can view"`);
    const text = await res.text();
    if (!text || text.trim().length < 10) throw new Error('Empty response — check sharing permissions');

    const parsed = parseCSV(text);
    sheets[idx].csvText  = text;
    sheets[idx].name     = `Sheet ${sheetCounter}`;
    sheets[idx].headers  = parsed[0] || [];
    sheets[idx].rowCount = Math.max(0, parsed.length - 1);
    sheets[idx].sheetId  = sheetId;
    sheets[idx].rows     = parsed;

    // Try to get the spreadsheet name from the page title via a metadata trick
    try {
      const metaRes = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/edit`, { mode: 'no-cors' });
      // no-cors won't expose body, that's fine — we just skip naming
    } catch(_) {}

    setStatus(idx, 'ok', `${sheets[idx].rowCount} rows`);
    updateSummary();
    updateQuickPrompts();

  } catch (err) {
    setStatus(idx, 'err', err.message.slice(0, 40));
  }

  btn.disabled = false;
}

function setStatus(idx, type, text) {
  const el = document.getElementById(`status-${idx}`);
  el.className = `sheet-status status-${type}`;
  el.textContent = text;
}

function parseCSV(text) {
  const lines = text.split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r.some(c => c));
}

function updateSummary() {
  const loaded = sheets.filter(s => s.rowCount > 0);
  const summary = document.getElementById('sheetsSummary');
  if (!loaded.length) { summary.style.display = 'none'; return; }
  summary.style.display = 'flex';
  summary.innerHTML = loaded.map((s, i) =>
    `<div class="sum-pill">${s.label}: <span>${s.rowCount} rows · ${s.headers.length} cols</span></div>`
  ).join('');
}

function updateQuickPrompts() {
  const loaded = sheets.filter(s => s.rowCount > 0);
  if (!loaded.length) return;

  // Generate prompts based on what's loaded
  const prompts = [
    'How many rows are in each sheet?',
    'What are the column headers in each sheet?',
    'Show me the first 5 rows of sheet 1',
    'Find any products that appear in multiple sheets',
    'What stores or suppliers appear most often?',
    'Summarize the data across all sheets',
  ];

  document.getElementById('quickPrompts').innerHTML = prompts.map(p =>
    `<button class="qp" onclick="fillQ('${p}')">${p}</button>`
  ).join('');
}

// ── Build context for AI ──
function buildContext() {
  const loaded = sheets.filter(s => s.rowCount > 0);
  if (!loaded.length) return null;

  let ctx = '';
  loaded.forEach((s, i) => {
    ctx += `\n\n=== ${s.label} (${s.rowCount} data rows) ===\n`;
    ctx += `Columns: ${s.headers.join(' | ')}\n\n`;

    // Include all rows (cap at 800 rows to stay within token limits)
    const rowsToInclude = s.rows.slice(1, 801);
    ctx += rowsToInclude.map(row => row.join(' | ')).join('\n');

    if (s.rows.length > 801) {
      ctx += `\n... (${s.rows.length - 801} more rows not shown due to size limits)`;
    }
  });
  return ctx;
}

// ── Ask ──
async function askQuestion() {
  const input = document.getElementById('queryInput');
  const q = input.value.trim();
  if (!q) return;

  const ctx = buildContext();
  if (!ctx) {
    alert('Load at least one sheet first.');
    return;
  }

  const btn = document.getElementById('askBtn');
  btn.disabled = true;
  btn.textContent = '...';

  const answerSection = document.getElementById('answerSection');
  const answerBody    = document.getElementById('answerBody');
  const answerQ       = document.getElementById('answerQ');

  answerSection.classList.add('visible');
  answerQ.textContent = q;
  answerBody.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const systemPrompt = `You are an expert e-commerce data analyst for Denis, who manages dropshipping operations. You have been given data from one or more Google Sheets. Answer the user's question precisely using only the provided data. Use **bold** for key values, numbers, and product names. Be direct and concise. When counting or listing, be exact.

SHEET DATA:
${ctx}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: "user", content: q }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    const answer = data.content?.[0]?.text || 'No response.';
    const formatted = answer.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    answerBody.innerHTML = `<div class="answer-body">${formatted}</div>`;

    history.unshift({ q, a: answer });
    renderHistory();
    input.value = '';

  } catch (err) {
    answerBody.innerHTML = `<div class="error-msg">// Error: ${err.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Ask →';
}

function fillQ(text) {
  document.getElementById('queryInput').value = text;
  document.getElementById('queryInput').focus();
}

function renderHistory() {
  if (history.length < 2) return;
  const section = document.getElementById('historySection');
  const list    = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = history.slice(1, 6).map((item, i) => `
    <div class="history-item" onclick="showHistory(${i+1})">
      <div class="hi-q">// ${item.q}</div>
      <div class="hi-a">${item.a.replace(/\*\*/g, '')}</div>
    </div>
  `).join('');
}

function showHistory(idx) {
  const item = history[idx];
  document.getElementById('answerQ').textContent = item.q;
  const formatted = item.a.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('answerBody').innerHTML = `<div class="answer-body">${formatted}</div>`;
  document.getElementById('answerSection').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(); }
});

// ── Init: start with one empty row ──
addSheetRow();
</script>
</body>
</html>
